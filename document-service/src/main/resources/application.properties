server.port=8082
spring.application.name=document-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/digital_lending}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lending_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lending_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Service URLs
application.service.url=${APPLICATION_SERVICE_URL:http://localhost:8081}
llm.service.url=${LLM_SERVICE_URL:http://localhost:8083}

# Local file storage (POC) — use 'local' profile by default, 's3' in production
spring.profiles.active=local
storage.local.base-path=${STORAGE_LOCAL_PATH:/tmp/documents}

# Multipart upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.digitallending=DEBUG
