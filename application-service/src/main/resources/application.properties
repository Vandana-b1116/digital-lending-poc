server.port=8081
spring.application.name=application-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/digital_lending}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lending_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lending_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — schema managed by db/init.sql, so validate only
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Service URLs
document.service.url=${DOCUMENT_SERVICE_URL:http://localhost:8082}
llm.service.url=${LLM_SERVICE_URL:http://localhost:8083}
underwriting.service.url=${UNDERWRITING_SERVICE_URL:http://localhost:8084}

# JWT
jwt.secret=${JWT_SECRET:digital-lending-jwt-secret-key-32chars}
jwt.expiration.ms=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.digitallending=DEBUG
