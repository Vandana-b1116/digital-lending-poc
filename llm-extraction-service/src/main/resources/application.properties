server.port=8083
spring.application.name=llm-extraction-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/digital_lending}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lending_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lending_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Service URLs
application.service.url=${APPLICATION_SERVICE_URL:http://localhost:8081}
document.service.url=${DOCUMENT_SERVICE_URL:http://localhost:8082}

# Claude API
claude.api.key=${CLAUDE_API_KEY:your-api-key-here}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-6
claude.max.tokens=1024
claude.timeout.seconds=10

# Discrepancy thresholds
discrepancy.income.high.threshold=0.10
discrepancy.income.medium.threshold=0.05
discrepancy.employer.similarity.threshold=0.80

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.digitallending=DEBUG
