server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular — serve index.html for all non-file routes (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services
    location /api-application/ {
        proxy_pass http://application-service:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api-document/ {
        proxy_pass http://document-service:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api-extraction/ {
        proxy_pass http://llm-extraction-service:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
